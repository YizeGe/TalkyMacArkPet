# ============================================================
# MacArkPet 屏幕触发配置
# ============================================================
# 用户可自由编辑此文件。修改后无需重启，下次触发时自动生效。
# 每个条目指定 app bundle ID 或窗口标题关键词，映射到对应的情境。
# 
# 格式说明：
#   [website_categories.情境名]
#   keyword = ["app_bundle_id1", "app_bundle_id2", ...]
#   keyword = ["标题关键词1", "标题关键词2", ...]
#
# 情境名会直接映射到角色台词表中的情境 key。
# 可用情境：coding, watching_video, social, chatting, reading_news,
#           shopping, gaming, working, email, designing, writing,
#           ai_chat, devops, studying, browsing, deep_night, idle_long

